version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: mlinzi_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - mlinzi_data:/var/lib/postgresql/data

volumes:
  mlinzi_data:
    driver: local
